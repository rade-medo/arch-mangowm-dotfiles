# MangoWM config — ~/.config/mango/config.conf

set $mod Alt
set $terminal kitty
set $launcher "rofi -show drun"

# Autostart
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=mango
exec-once = systemctl --user import-environment WAYLAND_DISPLAY XDG_CURRENT_DESKTOP
exec-once = waybar
exec-once = swaync
exec-once = swww-daemon
exec-once = swww img /usr/share/backgrounds/archlinux/arch-wallpaper.jpg --transition-type grow || true
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = wl-paste --watch cliphist store

# Core binds
bind = $mod, Return, exec, $terminal
bind = $mod, Space,  exec, $launcher
bind = $mod, Q,      killactive
bind = SUPER, M,     exit
bind = SUPER, F,     fullscreen
bind = SUPER, E,     exec, thunar
bind = SUPER, L,     exec, wlogout
bind = $mod, V,      exec, cliphist list | rofi -dmenu | cliphist decode | wl-copy

# Focus
bind = $mod, H, focusleft
bind = $mod, L, focusright
bind = $mod, K, focusup
bind = $mod, J, focusdown

# Move
bind = $mod SHIFT, H, movewindowleft
bind = $mod SHIFT, L, movewindowright
bind = $mod SHIFT, K, movewindowup
bind = $mod SHIFT, J, movewindowdown

# Workspaces
bind = $mod, 1, workspace, 1
bind = $mod, 2, workspace, 2
bind = $mod, 3, workspace, 3
bind = $mod, 4, workspace, 4
bind = $mod, 5, workspace, 5
bind = $mod SHIFT, 1, movetoworkspace, 1
bind = $mod SHIFT, 2, movetoworkspace, 2
bind = $mod SHIFT, 3, movetoworkspace, 3
bind = $mod SHIFT, 4, movetoworkspace, 4
bind = $mod SHIFT, 5, movetoworkspace, 5

# Media + brightness
bind = , XF86AudioRaiseVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%+
bind = , XF86AudioLowerVolume,  exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bind = , XF86AudioMute,         exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bind = , XF86MonBrightnessUp,   exec, brightnessctl set +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl set 10%-
bind = , XF86AudioPlay,         exec, playerctl play-pause
bind = , XF86AudioNext,         exec, playerctl next
bind = , XF86AudioPrev,         exec, playerctl previous

# Screenshot (requires grim + slurp)
bind = , Print,       exec, grim ~/Pictures/$(date +%Y%m%d_%H%M%S).png
bind = SHIFT, Print,  exec, grim -g "$(slurp)" ~/Pictures/$(date +%Y%m%d_%H%M%S).png

# Input
input kb_layout gb
input follow_mouse 1

# Layout
general gaps_in 6
general gaps_out 10
general border_size 2
general layout tile

# Decoration
decoration rounding 6
decoration active_opacity 1.0
decoration inactive_opacity 0.96
